<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML Live Editor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">H</span>
        <div>
          <h1>HTML Live Editor</h1>
          <p id="statusText">샘플 문서를 불러오는 중</p>
        </div>
      </div>
      <div class="toolbar" aria-label="문서 도구">
        <input id="fileInput" type="file" accept=".html,.htm,text/html" hidden>
        <button id="openFileBtn" type="button">열기</button>
        <button id="sampleBtn" type="button">샘플</button>
        <button id="copyBtn" type="button">복사</button>
        <button id="downloadBtn" type="button">다운로드</button>
      </div>
    </header>

    <aside class="page-panel" aria-label="페이지 목록">
      <div class="panel-header">
        <div>
          <h2>페이지</h2>
          <p id="detectionText">감지 대기</p>
        </div>
        <button id="addPageBtn" class="icon-button" type="button" title="페이지 추가">+</button>
      </div>
      <div id="pageList" class="page-list"></div>
      <div class="page-actions" aria-label="페이지 편집">
        <button id="renamePageBtn" type="button">이름</button>
        <button id="duplicatePageBtn" type="button">복제</button>
        <button id="moveUpBtn" class="icon-button" type="button" title="위로 이동">▲</button>
        <button id="moveDownBtn" class="icon-button" type="button" title="아래로 이동">▼</button>
        <button id="deletePageBtn" type="button">삭제</button>
      </div>
    </aside>

    <main class="workspace">
      <section class="preview-panel" aria-label="렌더링 미리보기">
        <div class="panel-header compact">
          <div>
            <h2 id="activePageTitle">미리보기</h2>
            <p id="editStateText">화면 편집 가능</p>
          </div>
          <div class="format-tools" aria-label="텍스트 서식">
            <button data-command="bold" type="button" title="굵게">B</button>
            <button data-command="italic" type="button" title="기울임">I</button>
            <button data-heading="h1" type="button" title="제목 1">H1</button>
            <button data-heading="h2" type="button" title="제목 2">H2</button>
            <button data-heading="h3" type="button" title="제목 3">H3</button>
            <label class="format-select" title="글자 크기">
              <span>크기</span>
              <select id="fontSizeSelect">
                <option value="">선택</option>
                <option value="14">14</option>
                <option value="18">18</option>
                <option value="24">24</option>
                <option value="32">32</option>
                <option value="44">44</option>
                <option value="60">60</option>
              </select>
            </label>
            <label class="format-select" title="줄간격">
              <span>행간</span>
              <select id="lineHeightSelect">
                <option value="">선택</option>
                <option value="1.1">1.1</option>
                <option value="1.3">1.3</option>
                <option value="1.5">1.5</option>
                <option value="1.8">1.8</option>
                <option value="2">2.0</option>
              </select>
            </label>
            <button id="highlightBtn" type="button" title="하이라이트">HL</button>
            <button id="linkBtn" type="button" title="링크">Link</button>
            <button data-command="removeFormat" type="button" title="서식 제거">Tx</button>
          </div>
        </div>
        <div class="preview-frame-wrap">
          <div class="preview-stage" aria-label="16:9 미리보기 화면">
            <iframe id="previewFrame" title="편집 가능한 HTML 미리보기"></iframe>
          </div>
        </div>
        <div class="layout-panel" aria-label="페이지 레이아웃 선택">
          <div class="layout-header">
            <div>
              <h2>레이아웃</h2>
              <p id="layoutStateText">현재 페이지에 적용</p>
            </div>
            <button id="applyLayoutBtn" type="button">적용</button>
          </div>
          <div class="layout-controls">
            <label>
              <span>카테고리</span>
              <select id="layoutCategorySelect"></select>
            </label>
            <label>
              <span>레이아웃</span>
              <select id="layoutSelect"></select>
            </label>
          </div>
          <div class="image-controls" aria-label="이미지 적용">
            <label>
              <span>이미지 URL</span>
              <input id="imageUrlInput" type="url" placeholder="https://example.com/image.jpg">
            </label>
            <button id="applyImageUrlBtn" type="button">URL 적용</button>
            <input id="imageFileInput" type="file" accept="image/*" hidden>
            <button id="chooseImageFileBtn" type="button">로컬 이미지</button>
            <p id="imageStateText">이미지 선택 대기</p>
          </div>
          <div id="layoutList" class="layout-list" aria-label="레이아웃 목록"></div>
        </div>
      </section>

      <section class="source-panel" aria-label="HTML 소스">
        <div class="panel-header compact">
          <div>
            <h2>HTML 소스</h2>
            <p id="sourceStateText">동기화됨</p>
          </div>
          <button id="applySourceBtn" type="button">적용</button>
        </div>
        <textarea id="sourceEditor" spellcheck="false" aria-label="HTML 소스 편집기"></textarea>
        <div class="typography-panel" aria-label="웹폰트 설정">
          <div class="typography-header">
            <div>
              <h2>웹폰트</h2>
              <p id="fontStateText">문서에 적용됨</p>
            </div>
            <button id="resetFontsBtn" type="button">기본값</button>
          </div>
          <div class="font-grid">
            <label class="font-css-row">
              <span>웹폰트 CSS</span>
              <textarea id="fontFaceCssInput" spellcheck="false" placeholder="@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
  font-weight: 400;
  font-display: swap;
}"></textarea>
            </label>
            <label class="font-row">
              <span>제목폰트</span>
              <input id="titleFontInput" type="text" autocomplete="off" placeholder="Gowun Batang">
              <input id="titleColorInput" type="color" aria-label="제목 컬러">
            </label>
            <label class="font-row">
              <span>본문폰트</span>
              <input id="bodyFontInput" type="text" autocomplete="off" placeholder="IBM Plex Sans KR">
              <input id="bodyColorInput" type="color" aria-label="본문 컬러">
            </label>
            <label class="font-row">
              <span>포인트폰트</span>
              <input id="pointFontInput" type="text" autocomplete="off" placeholder="IBM Plex Sans KR">
              <input id="pointColorInput" type="color" aria-label="포인트 컬러">
            </label>
          </div>
        </div>
        <div class="inspector">
          <h2>선택</h2>
          <dl>
            <div>
              <dt>요소</dt>
              <dd id="selectedElementText">없음</dd>
            </div>
            <div>
              <dt>텍스트</dt>
              <dd id="selectedTextText">0자</dd>
            </div>
            <div>
              <dt>정리</dt>
              <dd id="sanitizeText">대기</dd>
            </div>
          </dl>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
